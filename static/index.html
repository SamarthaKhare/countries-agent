<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Countries Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">

<style>
  /* ── Reset & tokens ─────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0c0e10;
    --surface:     #141618;
    --border:      #252830;
    --border-hi:   #3a3f4a;
    --ink:         #e8eaf0;
    --ink-dim:     #7a8099;
    --ink-dimmer:  #454b60;
    --accent:      #5bffc8;
    --accent-dim:  #1a4a3a;
    --warn:        #ff6b6b;
    --warn-dim:    #3a1a1a;
    --step-a:      #7eb8ff;
    --step-b:      #c4a7ff;
    --step-c:      #ffc96b;
    --mono:        'Space Mono', monospace;
    --serif:       'Fraunces', Georgia, serif;
    --radius:      6px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ─────────────────────────────────────────────────────────── */
  .shell {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Header ─────────────────────────────────────────────────────────── */
  header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
  }

  .logo-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .logo-glyph {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: -2px;
    line-height: 1;
  }

  .logo-text {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.5px;
  }

  .tagline {
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Main content ────────────────────────────────────────────────────── */
  main {
    padding: 40px 0;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* ── Query input ─────────────────────────────────────────────────────── */
  .input-block {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-label {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .query-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.15s;
  }

  .query-input::placeholder { color: var(--ink-dimmer); }

  .query-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-dim);
  }

  .submit-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0c1a14;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    padding: 12px 24px;
    cursor: pointer;
    letter-spacing: 0.04em;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }

  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Example chips ───────────────────────────────────────────────────── */
  .examples-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    color: var(--ink-dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Response panel ──────────────────────────────────────────────────── */
  .response-panel {
    display: none;
    flex-direction: column;
    gap: 20px;
    animation: fadeUp 0.25s ease;
  }

  .response-panel.visible { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Answer card ─────────────────────────────────────────────────────── */
  .answer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease infinite;
  }

  .status-dot.error { background: var(--warn); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .card-body {
    padding: 20px;
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.75;
    white-space: pre-wrap;
  }

  .card-body.error-text {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--warn);
  }

  /* ── Workflow trace ──────────────────────────────────────────────────── */
  .trace-block {}

  .trace-title {
    font-size: 11px;
    color: var(--ink-dimmer);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .trace-steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .trace-step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12px;
    color: var(--ink-dim);
  }

  .step-num {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    margin-top: 1px;
  }

  .step-num.s1 { background: var(--step-a); color: #0a1a2e; }
  .step-num.s2 { background: var(--step-b); color: #1a0a2e; }
  .step-num.s3 { background: var(--step-c); color: #2e1a0a; }

  .step-text { line-height: 1.5; color: var(--ink-dim); }

  /* ── Meta row ────────────────────────────────────────────────────────── */
  .meta-row {
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--ink-dimmer);
    letter-spacing: 0.06em;
  }

  .meta-item span { color: var(--ink-dim); }

  /* ── Loading state ───────────────────────────────────────────────────── */
  .loader {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 20px 0;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0.06em;
  }

  .loader.visible { display: flex; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-steps {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .loader-step {
    opacity: 0;
    font-size: 11px;
    transition: opacity 0.3s;
  }

  .loader-step.active { opacity: 1; color: var(--accent); }
  .loader-step.done   { opacity: 0.5; }

  /* ── Footer ──────────────────────────────────────────────────────────── */
  footer {
    padding: 24px 0;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--ink-dimmer);
    display: flex;
    justify-content: space-between;
    align-items: center;
    letter-spacing: 0.06em;
  }

  footer a { color: var(--ink-dim); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* ── Responsive ──────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    .shell { padding: 0 16px; }
    .input-row { flex-direction: column; }
    .submit-btn { width: 100%; }
    .meta-row { flex-wrap: wrap; gap: 10px; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- ── Header ── -->
  <header>
    <div class="logo-row">
      <span class="logo-glyph">⊕</span>
      <span class="logo-text">Countries Agent</span>
    </div>
    <p class="tagline">LangGraph · REST Countries API · Claude</p>
  </header>

  <!-- ── Main ── -->
  <main>

    <!-- Input -->
    <div class="input-block">
      <div class="input-label">Ask a question</div>
      <div class="input-row">
        <input
          id="queryInput"
          class="query-input"
          type="text"
          placeholder="What is the population of Germany?"
          autocomplete="off"
        />
        <button id="submitBtn" class="submit-btn" onclick="runQuery()">
          RUN →
        </button>
      </div>
      <div class="examples-row" id="examples"></div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-steps">
        <div class="loader-step" id="ls1">① Identifying country &amp; fields…</div>
        <div class="loader-step" id="ls2">② Fetching from REST Countries API…</div>
        <div class="loader-step" id="ls3">③ Synthesising answer…</div>
      </div>
    </div>

    <!-- Response -->
    <div class="response-panel" id="responsePanel">

      <div class="answer-card" id="answerCard">
        <div class="card-header">
          <span id="cardLabel">ANSWER</span>
          <div class="status-dot" id="statusDot"></div>
        </div>
        <div class="card-body" id="answerBody"></div>
      </div>

      <div class="trace-block">
        <div class="trace-title">Workflow trace</div>
        <div class="trace-steps" id="traceSteps"></div>
      </div>

      <div class="meta-row" id="metaRow"></div>

    </div>

  </main>

  <!-- ── Footer ── -->
  <footer>
    <span>Countries Agent v1.0</span>
    <span>
      <a href="/docs" target="_blank">API docs</a>
      &nbsp;·&nbsp;
      <a href="https://restcountries.com" target="_blank">REST Countries</a>
    </span>
  </footer>

</div>

<script>
  const EXAMPLES = [
    "What is the population of Germany?",
    "What currency does Japan use?",
    "What is the capital and area of Brazil?",
    "What languages are spoken in Switzerland?",
    "Which region is Kenya in?",
    "What are the neighbouring countries of France?",
    "Tell me about New Zealand's timezones.",
  ];

  // Render chips
  const examplesEl = document.getElementById("examples");
  EXAMPLES.forEach(q => {
    const chip = document.createElement("button");
    chip.className = "chip";
    chip.textContent = q;
    chip.onclick = () => {
      document.getElementById("queryInput").value = q;
      runQuery();
    };
    examplesEl.appendChild(chip);
  });

  // Enter key
  document.getElementById("queryInput").addEventListener("keydown", e => {
    if (e.key === "Enter") runQuery();
  });

  // ── Loader animation ────────────────────────────────────────────────────
  let loaderInterval = null;

  function startLoader() {
    const steps = ["ls1", "ls2", "ls3"];
    let idx = 0;
    steps.forEach(id => document.getElementById(id).className = "loader-step");
    document.getElementById("ls1").classList.add("active");

    loaderInterval = setInterval(() => {
      if (idx < steps.length - 1) {
        document.getElementById(steps[idx]).className = "loader-step done";
        idx++;
        document.getElementById(steps[idx]).classList.add("active");
      }
    }, 1200);
  }

  function stopLoader() {
    clearInterval(loaderInterval);
    ["ls1","ls2","ls3"].forEach(id => {
      document.getElementById(id).className = "loader-step done";
    });
  }

  // ── Main query runner ───────────────────────────────────────────────────
  async function runQuery() {
    const query = document.getElementById("queryInput").value.trim();
    if (!query) return;

    // UI: loading state
    document.getElementById("submitBtn").disabled = true;
    document.getElementById("responsePanel").classList.remove("visible");
    document.getElementById("loader").classList.add("visible");
    startLoader();

    try {
      const res = await fetch("/api/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query }),
      });

      const data = await res.json();
      stopLoader();
      renderResponse(data);
    } catch (err) {
      stopLoader();
      renderResponse({
        query,
        answer: null,
        error: "Network error — is the server running?",
        steps: [],
        success: false,
        duration_ms: 0,
      });
    } finally {
      document.getElementById("loader").classList.remove("visible");
      document.getElementById("submitBtn").disabled = false;
    }
  }

  function renderResponse(data) {
    const panel    = document.getElementById("responsePanel");
    const body     = document.getElementById("answerBody");
    const dot      = document.getElementById("statusDot");
    const label    = document.getElementById("cardLabel");
    const trace    = document.getElementById("traceSteps");
    const meta     = document.getElementById("metaRow");

    // Answer / error
    if (data.error && !data.answer) {
      body.textContent = `⚠ ${data.error}`;
      body.className = "card-body error-text";
      dot.className = "status-dot error";
      label.textContent = "ERROR";
    } else {
      body.textContent = data.answer || "(no answer)";
      body.className = "card-body";
      dot.className = "status-dot";
      label.textContent = data.country_name
        ? `ANSWER · ${data.country_name.toUpperCase()}`
        : "ANSWER";
    }

    // Trace steps
    trace.innerHTML = "";
    const stepColors = ["s1", "s2", "s3"];
    const stepLabels = ["IDENTIFY", "FETCH", "SYNTHESIZE"];
    (data.steps || []).forEach((step, i) => {
      const clean = step.replace(/^[a-z_]+: /i, "");
      const el = document.createElement("div");
      el.className = "trace-step";
      el.innerHTML = `
        <span class="step-num ${stepColors[i] || 's3'}">${i+1}</span>
        <span class="step-text"><strong style="color:var(--ink-dim)">${stepLabels[i] || ''}</strong> — ${clean}</span>
      `;
      trace.appendChild(el);
    });

    // Meta
    const fields = (data.requested_fields || []).join(", ") || "—";
    meta.innerHTML = `
      <div class="meta-item">DURATION&nbsp;<span>${data.duration_ms ?? 0} ms</span></div>
      <div class="meta-item">FIELDS&nbsp;<span>${fields}</span></div>
    `;

    panel.classList.add("visible");
  }
</script>
</body>
</html>
